version: '3.8'

services:
  reader-app:
    image: ghcr.io/padkri/chandi-saptasati:latest
    container_name: durga-saptasati-reader-app
    restart: always
    environment:
      APP_ENV: production
      APP_MODE: prod
      PYTHONDONTWRITEBYTECODE: 1
      PYTHONUNBUFFERED: 1
    ports:
      - "8000:8000"
    volumes:
      - ./public/data:/app/public/data:ro
      - ./logs:/var/log/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
