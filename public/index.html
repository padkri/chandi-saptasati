<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Durga Saptashati - Reader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Serif+Telugu:wght@400;600;700&family=Noto+Serif:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=16">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar no-print">
            <div class="sidebar-header">
                <h2>Contents</h2>
            </div>
            <nav class="sidebar-nav">
                <ul id="sloka-list">
                    <!-- Sloka links injected here via JS -->
                </ul>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-nav no-print">
                <a class="brand" href="/">
                    <span class="brand-mark">ॐ</span>
                    <span>
                        <strong>Durga Saptashati</strong>
                        <small>Reader</small>
                    </span>
                </a>
                <nav class="mode-nav" aria-label="Mode navigation">
                    <a href="/" class="mode-link active">Reader</a>
                    <a href="/dhyana-slokas" class="mode-link">Dhyana Slokas</a>
                    <a href="/publisher" class="mode-link" data-dev-only hidden>Publisher</a>
                </nav>
                <div class="actions nav-actions">
                    <label class="expert-toggle" title="Show deeper grammar details in Reader Mode">
                        <input type="checkbox" id="expertModeToggle">
                        <span>Expert</span>
                    </label>
                    <button class="btn btn-outline" id="print-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                        Print PDF
                    </button>
                </div>
            </header>

            <!-- Loading State -->
            <div id="loading-spinner" class="loading-container hidden no-print">
                <div class="spinner"></div>
            </div>

            <!-- Content Container -->
            <article class="sloka-view" id="sloka-view">
                <div class="empty-state no-print" id="empty-state">
                    <h3>Select a Sloka</h3>
                    <p>Choose a sloka from the sidebar to view its meaning.</p>
                </div>
            </article>
        </main>
    </div>

    <!-- Template for rendering a Sloka -->
    <template id="sloka-template">
        <div class="sloka-card">
            <!-- Header for Print -->
            <div class="print-header only-print">
                <h1 class="print-title" data-content="source">Durga Saptashati</h1>
                <p class="print-subtitle">Chapter <span data-content="chapter"></span>, Sloka <span data-content="sloka_number"></span></p>
                <hr class="print-divider">
            </div>

            <div class="meta-info no-print">
                <span class="badge" data-content="source">Source</span>
                <span class="badge">Chapter <span data-content="chapter"></span></span>
                <span class="badge">Sloka <span data-content="sloka_number"></span></span>
            </div>

            <div class="sanskrit-section">
                <h2 class="original-sloka" data-content="sloka_original"></h2>
                <p class="anvaya"><span class="label">అన్వయము:</span> <span data-content="anvaya"></span></p>
            </div>

            <div class="meaning-section">
                <div class="tatparyam">
                    <h3 class="section-title">తాత్పర్యము (Meaning)</h3>
                    <p class="telugu-meaning" data-content="tatparyam.telugu"></p>
                    <p class="english-meaning" data-content="tatparyam.english"></p>
                </div>
            </div>

            <div class="grammar-grid">
                <div class="grammar-card">
                    <h4>పద విభాగం (Pada Vibhaga)</h4>
                    <ul class="pada-list" data-list="pada_vibhaga"></ul>
                </div>
                <div class="grammar-card">
                    <h4>సమాసాలు (Samasas)</h4>
                    <ul class="samasa-list" data-list="samasas"></ul>
                </div>
                <div class="grammar-card">
                    <h4>సంధులు (Sandhis)</h4>
                    <ul class="sandhi-list" data-list="sandhis"></ul>
                </div>
            </div>

            <div class="chandas-section">
                <span class="label">ఛందస్సు/అలంకారం (Alamkaram/Chandas):</span> 
                <span data-content="alamkaram_chandas"></span>
            </div>
            
            <!-- Footer for Print -->
            <div class="print-footer only-print">
                <p>Generated for study and preservation.</p>
            </div>
        </div>
    </template>

    <script src="/app-config.js?v=16"></script>
    <script src="nav.js?v=16"></script>
    <script src="script.js?v=16"></script>
</body>
</html>
